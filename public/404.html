<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Página não encontrada — thestation.ai</title>
  <meta name="description" content="A página que você procura não existe ou foi movida.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body>

  <header id="site-header"></header>

  <main>
    <div class="error-page">
      <div class="error-page__content">
        <span class="error-page__code" aria-hidden="true">404</span>
        <h1 class="error-page__title">Página não encontrada</h1>
        <p class="error-page__desc">
          A página que você procura não existe, foi movida ou o endereço está incorreto.
        </p>
        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
          <a href="/" class="btn btn--primary">Ir para a Home</a>
          <a href="/noticias" class="btn btn--outline">Ver Notícias</a>
        </div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="/assets/js/components.js"></script>
</body>
</html>
