  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Blog thestation.ai",
    "url": "https://thestation.ai/blog",
    "description": "Artigos e análises sobre Inteligência Artificial em português.",
    "publisher": {
      "@type": "Organization",
      "name": "thestation.ai",
      "url": "https://thestation.ai"
    }
  }

  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">
  <link rel="stylesheet" href="/assets/css/main.css">

<body>

  <header id="site-header"></header>

  <main>

        <nav class="breadcrumb" aria-label="Navegação estrutural">

    <section class="section">
      <div class="container">
        <div class="filters" id="filters">
          <input type="text" class="filters__search" id="search-input" placeholder="Buscar posts...">
          <select class="filters__select" id="category-filter">
            <option value="">Todas as categorias</option>
          </select>
        </div>

        <div class="posts-grid" id="posts-grid">
          <!-- carregado via post-list.js -->
        </div>

        <div class="pagination" id="pagination"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="/assets/js/components.js"></script>
  <script type="module" src="/assets/js/post-list.js"></script>
