<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Conteúdo — Admin thestation.ai</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="admin-page">

  <script type="module">
    import { requireAuth } from '/assets/js/auth.js';
    requireAuth();
  </script>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>

    <div class="admin-content">
      <header class="admin-topbar" id="admin-topbar"></header>

      <main class="admin-main">
        <div class="admin-page-header">
          <h1 class="admin-page-title">Gerenciar Conteúdo</h1>
          <a href="/admin/editor.html" class="btn btn--primary">+ Novo Post</a>
        </div>

        <!-- Filtros -->
        <div class="admin-filters">
          <input type="text" id="search-input" placeholder="Buscar por título..." class="admin-search">
          <select id="type-filter">
            <option value="">Todos os tipos</option>
            <option value="blog">Blog</option>
            <option value="news">Notícia</option>
          </select>
          <select id="status-filter">
            <option value="">Todos os status</option>
            <option value="published">Publicado</option>
            <option value="draft">Rascunho</option>
            <option value="scheduled">Agendado</option>
          </select>
        </div>

        <!-- Tabela -->
        <div class="admin-table-wrapper">
          <table class="admin-table" id="posts-table">
            <thead>
              <tr>
                <th>Título</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Categoria</th>
                <th>Publicado em</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="posts-tbody">
              <!-- carregado via post-manager.js -->
            </tbody>
          </table>
        </div>

        <div class="admin-pagination" id="pagination"></div>
      </main>
    </div>
  </div>

  <script type="module" src="/assets/js/firebase-config.js"></script>
  <script type="module" src="/assets/js/admin/post-manager.js"></script>
</body>
</html>
