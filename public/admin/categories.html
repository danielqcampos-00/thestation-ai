<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — Admin thestation.ai</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="admin-page">

  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>

    <div class="admin-content">
      <header class="admin-topbar" id="admin-topbar"></header>

      <main class="admin-main">
        <div class="admin-page-header">
          <h1 class="admin-page-title">Categorias</h1>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start">

          <!-- Formulário nova categoria -->
          <div class="editor-card">
            <div class="editor-card__title">Nova Categoria</div>
            <div class="form-group">
              <label for="cat-name">Nome *</label>
              <input type="text" id="cat-name" placeholder="ex: LLMs, Ferramentas de IA">
            </div>
            <div class="form-group">
              <label for="cat-slug">Slug *</label>
              <input type="text" id="cat-slug" placeholder="ex: llms, ferramentas-de-ia">
              <small>Usado na URL: /blog/<strong>slug</strong>/nome-do-post</small>
            </div>
            <div class="form-group">
              <label for="cat-type">Aparece em</label>
              <select id="cat-type">
                <option value="both">Blog e Notícias</option>
                <option value="blog">Somente Blog</option>
                <option value="news">Somente Notícias</option>
              </select>
            </div>
            <div class="form-group">
              <label for="cat-desc">Descrição (opcional)</label>
              <textarea id="cat-desc" rows="2" placeholder="Breve descrição da categoria"></textarea>
            </div>
            <button class="btn btn--primary" id="save-cat-btn" style="color:#fff">Criar Categoria</button>
            <p id="cat-feedback" role="alert" aria-live="polite" style="margin-top:0.75rem;font-size:0.875rem"></p>
          </div>

          <!-- Lista de categorias -->
          <div class="editor-card">
            <div class="editor-card__title">Categorias Existentes</div>
            <div id="categories-list">
              <div class="spinner" style="margin:1rem auto"></div>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/assets/js/admin/categories.js"></script>
</body>
</html>
