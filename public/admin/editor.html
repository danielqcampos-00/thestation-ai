<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — Admin thestation.ai</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/lib/quill.snow.css">
</head>
<body class="admin-page">

  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>

    <div class="admin-content">
      <header class="admin-topbar" id="admin-topbar"></header>

      <main class="admin-main">
        <div class="admin-page-header">
          <h1 class="admin-page-title">Novo Post</h1>
          <div class="editor-actions">
            <a href="/admin/posts.html" class="btn btn--ghost btn--sm">← Voltar</a>
            <button class="btn btn--outline" id="save-draft-btn" style="color:#a5b4fc;border-color:#6366f1;">💾 Rascunho</button>
            <button class="btn btn--primary" id="publish-btn" style="background:#6366f1;color:#fff;border-color:#6366f1;">🚀 Publicar</button>
          </div>
        </div>

        <p class="editor-feedback" id="editor-feedback" role="alert" aria-live="polite"></p>

        <div class="editor-form" id="editor-form">

          <!-- ── Coluna principal ───────────────────────────── -->
          <div class="editor-main">

            <div class="form-group">
              <label for="post-title">Título *</label>
              <input type="text" id="post-title" placeholder="Título do post" autocomplete="off">
            </div>

            <div class="form-group">
              <label for="post-slug">Slug (URL) *</label>
              <div class="slug-field">
                <span class="slug-field__prefix" id="slug-prefix">thestation.ai/blog/</span>
                <input type="text" id="post-slug" placeholder="titulo-do-post" autocomplete="off">
              </div>
            </div>

            <!-- Toggle modo de conteúdo -->
            <div class="form-group">
              <div class="content-toolbar">
                <label>Conteúdo *</label>
                <div class="content-mode-toggle">
                  <button type="button" class="content-mode-btn active" data-mode="richtext">Rich Text</button>
                  <button type="button" class="content-mode-btn" data-mode="markdown">Markdown</button>
                </div>
              </div>

              <!-- Rich Text (Quill) -->
              <div id="quill-wrap" class="quill-container">
                <div id="quill-editor"></div>
              </div>

              <!-- Markdown -->
              <div id="markdown-wrap" class="markdown-editor__panes hidden">
                <div class="markdown-editor__input">
                  <textarea id="markdown-content" placeholder="Escreva em Markdown..."></textarea>
                </div>
                <div class="markdown-editor__preview prose" id="markdown-preview"></div>
              </div>
            </div>

          </div>

          <!-- ── Sidebar do editor ──────────────────────────── -->
          <aside class="editor-sidebar">

            <!-- Publicação -->
            <div class="editor-card">
              <div class="editor-card__title">Publicação</div>
              <div class="form-group">
                <label for="post-type">Tipo *</label>
                <select id="post-type">
                  <option value="blog">Blog</option>
                  <option value="news">Notícia</option>
                </select>
              </div>
              <div class="form-group">
                <label for="post-status">Status</label>
                <select id="post-status">
                  <option value="draft">Rascunho</option>
                  <option value="published">Publicado</option>
                  <option value="scheduled">Agendado</option>
                </select>
              </div>
              <div class="form-group hidden" id="schedule-wrap">
                <label for="post-scheduled-at">Data de publicação</label>
                <input type="datetime-local" id="post-scheduled-at">
              </div>
            </div>

            <!-- Imagem e categorização -->
            <div class="editor-card">
              <div class="editor-card__title">Imagem e Categorização</div>
              <div class="form-group">
                <label for="post-image">URL da Imagem de Destaque</label>
                <input type="url" id="post-image" placeholder="https://...">
                <div class="image-preview hidden" id="image-preview">
                  <img src="" alt="Preview">
                </div>
              </div>
              <div class="form-group">
                <label for="post-category">Categoria</label>
                <select id="post-category">
                  <option value="">Sem categoria</option>
                </select>
                <small>
                  Não encontrou? <a href="/admin/categories.html" target="_blank" style="color:var(--accent)">Criar nova categoria ↗</a>
                </small>
              </div>
              <div class="form-group">
                <label for="post-tags">Tags</label>
                <input type="text" id="post-tags" placeholder="tag1, tag2, tag3">
                <small>Separadas por vírgula</small>
              </div>
              <div class="form-group">
                <label for="post-excerpt">Resumo (Excerpt)</label>
                <div class="excerpt-field">
                  <textarea id="post-excerpt" rows="3" placeholder="Breve descrição..."></textarea>
                  <button type="button" class="ai-suggest-btn" id="ai-suggest-excerpt" title="Em breve">✦ IA</button>
                </div>
              </div>
              <div class="form-group form-group--toggle">
                <label for="post-ai-readable">
                  Otimizado para IA
                  <small>Formata para leitura por LLMs</small>
                </label>
                <input type="checkbox" id="post-ai-readable" role="switch">
              </div>
            </div>

            <!-- SEO -->
            <details class="editor-card editor-card--collapsible">
              <summary class="editor-card__title">SEO</summary>

              <div class="form-group">
                <label for="seo-meta-title">Meta Title</label>
                <input type="text" id="seo-meta-title" placeholder="Default: título do post">
                <div class="char-counter" id="seo-meta-title-count">0/60</div>
              </div>
              <div class="form-group">
                <label for="seo-meta-desc">Meta Description</label>
                <textarea id="seo-meta-desc" rows="3" placeholder="Default: excerpt"></textarea>
                <div class="char-counter" id="seo-meta-desc-count">0/160</div>
              </div>
              <div class="form-group">
                <label for="seo-canonical">URL Canônica</label>
                <input type="url" id="seo-canonical" placeholder="Default: URL do post">
              </div>
              <div class="form-group">
                <label for="seo-og-title">OG Title</label>
                <input type="text" id="seo-og-title" placeholder="Default: meta title">
              </div>
              <div class="form-group">
                <label for="seo-og-desc">OG Description</label>
                <textarea id="seo-og-desc" rows="2" placeholder="Default: meta description"></textarea>
              </div>
              <div class="form-group">
                <label for="seo-og-image">OG Image URL</label>
                <input type="url" id="seo-og-image" placeholder="Default: imagem de destaque">
              </div>
              <div class="form-group">
                <label for="seo-twitter-card">Twitter Card</label>
                <select id="seo-twitter-card">
                  <option value="summary_large_image">summary_large_image</option>
                  <option value="summary">summary</option>
                </select>
              </div>
            </details>

            <!-- JSON-LD -->
            <details class="editor-card editor-card--collapsible">
              <summary class="editor-card__title">JSON-LD Schema</summary>
              <div class="form-group">
                <label for="post-schema">Schema Markup</label>
                <textarea id="post-schema" rows="8" placeholder="Deixe vazio para auto-gerar Article schema."></textarea>
                <small>JSON-LD customizado. Auto-gerado se vazio.</small>
              </div>
            </details>

          </aside>
        </div><!-- /editor-form -->
      </main>
    </div>
  </div>

  <script src="/assets/lib/quill.min.js"></script>
  <script src="/assets/lib/marked.min.js"></script>
  <script src="/assets/lib/dompurify.min.js"></script>
  <script type="module" src="/assets/js/admin/editor.js"></script>
</body>
</html>
