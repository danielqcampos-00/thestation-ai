<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Admin thestation.ai</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="admin-login-page">

  <div class="login-container">
    <div class="login-card">
      <div class="login-card__logo">
        <img src="/assets/img/logo.svg" alt="thestation.ai" width="48" height="48">
        <span>thestation.ai</span>
      </div>
      <h1 class="login-card__title">Acesso Admin</h1>

      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <p class="form-feedback form-feedback--error" id="login-error" role="alert" aria-live="polite"></p>
        <button type="submit" class="btn btn--primary btn--full" id="login-btn">Entrar</button>
      </form>
    </div>
  </div>

  <script type="module" src="/assets/js/firebase-config.js"></script>
  <script type="module" src="/assets/js/auth.js"></script>
</body>
</html>
